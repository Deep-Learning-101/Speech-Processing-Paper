name: Sync Speech-Processing

on:
  push:
    branches: [ main ]
    paths:
      - 'README.md'
      - '_includes/ai-share.html'
      - '**/images/**'
      - '.github/workflows/sync.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sub Repo
        uses: actions/checkout@v4
        with:
          path: sub-repo
          fetch-depth: 0

      - name: Checkout Main Repo
        uses: actions/checkout@v4
        with:
          repository: Deep-Learning-101/deep-learning-101.github.io
          token: ${{ secrets.GH_PAT }}
          path: main-repo
          fetch-depth: 0

      - name: Selective Sync
        working-directory: sub-repo
        run: |
          # 獲取前一個 commit 的 SHA
          if [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ] && [ ! -z "${{ github.event.before }}" ]; then
            BASE_SHA="${{ github.event.before }}"
          else
            BASE_SHA="${{ github.sha }}~1"
          fi
          
          # 獲取變更的文件列表
          echo "Comparing: $BASE_SHA to ${{ github.sha }}"
          CHANGED_FILES=$(git diff --name-only $BASE_SHA..${{ github.sha }} 2>/dev/null || git diff --name-only HEAD~1 2>/dev/null || echo "README.md")
          
          echo "Changed files: $CHANGED_FILES"
          
          if echo "$CHANGED_FILES" | grep -q "README.md"; then
            echo "Syncing README..."
            cp README.md ../main-repo/Speech-Processing.md
          fi
          
          if echo "$CHANGED_FILES" | grep -q "_includes/ai-share.html"; then
            echo "Syncing _includes..."
            mkdir -p ../main-repo/_includes
            cp _includes/ai-share.html ../main-repo/_includes/ai-share.html
          fi
          
          if echo "$CHANGED_FILES" | grep -q "images/"; then
            echo "Syncing images..."
            mkdir -p ../main-repo/images
            cp -a images/. ../main-repo/images/
          fi

      - name: Commit and Push
        working-directory: main-repo
        run: |
          ORIGINAL_MSG="${{ github.event.head_commit.message }}"
          AUTHOR_NAME="${{ github.event.head_commit.author.name }}"
          AUTHOR_EMAIL="${{ github.event.head_commit.author.email }}"
          SUB_SHA="${{ github.sha }}"
          
          git config user.name "${AUTHOR_NAME:-github-actions[bot]}"
          git config user.email "${AUTHOR_EMAIL:-github-actions[bot]@users.noreply.github.com}"
          
          git add .
          
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Speech Selective Sync: $ORIGINAL_MSG (From Sub: ${SUB_SHA:0:7})"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes detected, skipping sync."
          fi
