name: Sync Speech-Processing

on:
  push:
    branches: [ main ]
    paths:
      - 'README.md'
      - '_includes/ai-share.html' # 監控 HTML 變動
      - '**/images/**'
      - '.github/workflows/sync.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Sub Repo
        uses: actions/checkout@v4
        with:
          path: sub-repo
          fetch-depth: 0 # 為了偵測變動檔案，需要抓取歷史紀錄

      - name: Checkout Main Repo
        uses: actions/checkout@v4
        with:
          repository: Deep-Learning-101/deep-learning-101.github.io
          token: ${{ secrets.GH_PAT }}
          path: main-repo
          fetch-depth: 0 

      # 使用 paths-filter 偵測哪個部分被改動了
      - name: Check which files changed
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            readme:
              - 'README.md'
            includes:
              - '_includes/ai-share.html'
            images:
              - '**/images/**'

      - name: Selective Sync
        run: |
          # 1. 只有 README 修改時才同步 README
          if [ "${{ steps.filter.outputs.readme }}" == 'true' ]; then
            echo "Syncing README..."
            cp sub-repo/README.md main-repo/Speech-Processing.md
          fi

          # 2. 只有 ai-share.html 修改時才同步 _includes 資料夾
          if [ "${{ steps.filter.outputs.includes }}" == 'true' ]; then
            echo "Syncing _includes..."
            mkdir -p main-repo/_includes
            cp sub-repo/_includes/ai-share.html main-repo/_includes/ai-share.html
          fi

          # 3. 處理 images (依據原本邏輯)
          if [ "${{ steps.filter.outputs.images }}" == 'true' ]; then
            echo "Syncing images..."
            # 這裡可以保留你原本的迴圈邏輯，但只針對 images
            mkdir -p main-repo/images
            cp -a sub-repo/images/. main-repo/images/
          fi

      - name: Commit and Push
        run: |
          cd main-repo
          ORIGINAL_MSG="${{ github.event.head_commit.message }}"
          AUTHOR_NAME="${{ github.event.head_commit.author.name }}"
          AUTHOR_EMAIL="${{ github.event.head_commit.author.email }}"
          SUB_SHA="${{ github.sha }}"

          git config user.name "${AUTHOR_NAME:-github-actions[bot]}"
          git config user.email "${AUTHOR_EMAIL:-github-actions[bot]@users.noreply.github.com}"

          git add .
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Speech Selective Sync: $ORIGINAL_MSG (From Sub: ${SUB_SHA:0:7})"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes detected, skipping sync."
          fi
